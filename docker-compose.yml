services:
  railcontroller:
    build: .
    container_name: railcontroller
    restart: unless-stopped
    network_mode: host
    volumes:
      - railcontroller_data:/data
    environment:
      - Z21_HOST=192.168.0.111
      - Z21_PORT=21105
      - Z21_MOCK=false
      - DATABASE_URL=sqlite:////data/railcontroller.db
      - LOG_LEVEL=info

volumes:
  railcontroller_data:
